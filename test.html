<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Permission SVG Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .svg-container {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Permission SVG Generator</h1>
        <form id="svg-form">
            <div class="form-group">
                <label for="permissions">Permissions (0-6):</label>
                <input type="number" id="permissions" min="0" max="6" value="2">
            </div>
            <div class="form-group">
                <label for="times">Times (0-6):</label>
                <input type="number" id="times" min="0" max="6" value="4">
            </div>
            <div class="form-group">
                <label for="access">Access (0-6):</label>
                <input type="number" id="access" min="0" max="6" value="6">
            </div>
            <div class="form-group">
                <label for="color">Color:</label>
                <input type="color" id="color" value="#111111">
            </div>
            <button type="button" id="generate-btn">Generate SVG</button>
        </form>
        <div class="svg-container">
            <div id="svg-output"></div>
        </div>
    </div>

    <script src="a.js"></script>
    <script>
        document.getElementById('generate-btn').addEventListener('click', function() {
            const permissions = parseInt(document.getElementById('permissions').value);
            const times = parseInt(document.getElementById('times').value);
            const access = parseInt(document.getElementById('access').value);
            const color = document.getElementById('color').value;

            const svgHtml = generatePermissionSvg(permissions, times, access, color);
            document.getElementById('svg-output').innerHTML = svgHtml;
        });
    </script>
</body>
</html>
